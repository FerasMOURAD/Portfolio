<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio</title>
    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            padding-top: 80px;
        }

        /* Mécanique de masquage des pages */
        section {
            min-height: 50vh;
            padding: 20px;
            display: none;
        }

        section.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .profile-img {
            width: 100%;
            max-width: 300px;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <!-- 1. BARRE DE NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="naviguerVers('accueil')">Mon Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- A FAIRE : Complète les liens pour qu'ils pointent vers les bonnes sections -->
                    <li class="nav-item"><a class="nav-link" href="#" onclick="naviguerVers('accueil')">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="naviguerVers('cv')">CV</a></li>
                    <!-- Ajoute les liens pour Liens et Loisirs ici -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- 2. SECTION ACCUEIL -->
    <section id="accueil" class="active container">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <!-- A FAIRE : Mets ta propre image ou un placeholder -->
                <img src="https://via.placeholder.com/300" alt="Ma photo" class="profile-img">
            </div>
            <div class="col-md-5">
                <!-- A FAIRE : Ton Nom et Prénom + Biographie -->
                <h1>[Ton Nom]</h1>
                <p class="lead">[Ton poste / Ta spécialité]</p>
                <hr>
                <p>[Ta courte biographie ici...]</p>

                <!-- A FAIRE : Un bouton qui mène vers la section CV -->
            </div>
            <div class="col-md-3">
                <aside class="p-3 bg-light rounded border">
                    <h4>Contact</h4>
                    <!-- A FAIRE : Tes infos de contact (Liste <ul>) -->
                </aside>
            </div>
        </div>
    </section>

    <!-- 3. SECTION CV -->
    <section id="cv" class="container">
        <h2 class="text-center">Mon CV</h2>

        <div class="text-center mb-4">
            <!-- A FAIRE : Les deux boutons pour changer de langue -->
            <!-- Ils doivent appeler la fonction afficherCV('fr') ou afficherCV('en') -->
            <button class="btn btn-primary" onclick="">Français</button>
            <button class="btn btn-secondary" onclick="">Anglais</button>
        </div>

        <!-- C'est ici que le JavaScript va injecter le code du CV -->
        <div id="contenu-cv" class="p-4 border rounded shadow-sm bg-white">
            <p class="text-center text-muted">Sélectionnez une langue...</p>
        </div>
    </section>

    <!-- 4. SECTION LIENS -->
    <section id="liens" class="container">
        <h2>Mes Références</h2>
        <div class="list-group">
            <!-- A FAIRE : Crée une liste de liens (balises <a> avec la classe 'list-group-item') -->
            <!-- Exemple : <a href="..." class="list-group-item">Mon École</a> -->
        </div>
        <!-- A FAIRE : Ajoute un bouton retour accueil en bas -->
    </section>

    <!-- 5. SECTION LOISIRS -->
    <section id="loisirs" class="container">
        <h2>Mes Loisirs</h2>
        <div class="row">
            <!-- A FAIRE : Ajoute deux colonnes (col-md-6) contenant chacune une 'card' Bootstrap pour un loisir -->
        </div>
        <!-- A FAIRE : Ajoute un bouton retour accueil en bas -->
    </section>

    <!-- Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- PARTIE 1 : LA NAVIGATION (Le Switch/Case visuel) ---
        function naviguerVers(idSection) {
            // A FAIRE :
            // 1. Récupérer toutes les balises <section> et enlever la classe 'active' (pour les cacher).
            //    Indice : document.querySelectorAll('section').forEach(...)

            // 2. Récupérer la section qu'on veut afficher (grâce à idSection) et lui ajouter la classe 'active'.
            //    Indice : document.getElementById(...)

            // 3. (Optionnel) Scroller en haut de page : window.scrollTo(0,0);
        }

        // --- PARTIE 2 : LE CV DYNAMIQUE (L'Injection de contenu) ---
        function afficherCV(langue) {
            // A FAIRE :
            // 1. Cibler la div qui doit contenir le CV (id="contenu-cv")
            let zoneCV = document.getElementById("contenu-cv");

            // 2. Faire un if / else if sur la variable 'langue'
            if (langue === 'fr') {
                // 3. Injecter le code HTML du CV français
                // Utilise zoneCV.innerHTML = `...code html...`; 
                // N'oublie pas d'utiliser les backticks (`) pour pouvoir écrire sur plusieurs lignes
                zoneCV.innerHTML = `
                    <h3>Mon CV Français</h3>
                    <p>Complète ici avec tes expériences, études, etc...</p>
                `;
            }
            else if (langue === 'en') {
                // 4. Injecter le code HTML du CV anglais (ou un message "Coming soon")
                zoneCV.innerHTML = `<p>English version coming soon...</p>`;
            }
        }
    </script>
</body>

</html>
